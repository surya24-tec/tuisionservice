<aside class="sidebar" [class.collapsed]="collapsed">
  <!-- Logo / Brand -->
  <div class="sidebar-header">
    <div class="brand">
      <mat-icon class="brand-icon">school</mat-icon>
      <span class="brand-text" *ngIf="!collapsed">Smart Tuition</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a *ngFor="let item of menuItems"
       class="nav-item"
       [routerLink]="item.route"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: item.route.endsWith('dashboard') }"
       [matTooltip]="collapsed ? item.label : ''">
      <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
      <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && !collapsed">{{ item.badge }}</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a class="nav-item" routerLink="profile" routerLinkActive="active"
       [matTooltip]="collapsed ? 'Profile' : ''">
      <mat-icon class="nav-icon">person</mat-icon>
      <span class="nav-label" *ngIf="!collapsed">Profile</span>
    </a>
    <a class="nav-item logout-item" (click)="logout()"
       [matTooltip]="collapsed ? 'Logout' : ''">
      <mat-icon class="nav-icon">logout</mat-icon>
      <span class="nav-label" *ngIf="!collapsed">Logout</span>
    </a>
  </div>
</aside>
