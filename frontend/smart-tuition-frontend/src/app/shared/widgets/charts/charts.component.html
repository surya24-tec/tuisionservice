<div class="chart-card">
  <div class="chart-header">
    <h3>{{ title }}</h3>
  </div>
  <div class="chart-container">
    <canvas baseChart
      [datasets]="chartData"
      [labels]="chartLabels"
      [options]="chartOptions"
      [type]="chartType"
      [legend]="true">
    </canvas>
  </div>
</div>
