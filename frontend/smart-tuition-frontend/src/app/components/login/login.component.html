<div class="page-container">
  <div class="login-card">
    <div class="card-header">
      <h1 class="app-title">Learnify</h1>
      <p class="app-subtitle">Smart Tution Management</p>
    </div>
    
    
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" formControlName="username" class="form-input" placeholder="Enter your username" required>
        @if (loginForm.get('username')?.touched && loginForm.get('username')?.invalid) {
          <span class="form-error">Username is required</span>
        }
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-input-container">
          <input [type]="hidePassword ? 'password' : 'text'" formControlName="password" class="form-input" placeholder="Enter your password" required>
          <button type="button" class="password-toggle" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
        </div>
        @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
          <span class="form-error">Password is required</span>
        }
      </div>

      <button type="submit" class="submit-btn" [disabled]="!loginForm.valid">
        Sign In
      </button>
      <div class=" d-flex justify-content-end">
      <a routerLink="/register" >click here</a>
    </div>
    </form>
  </div>
</div>
