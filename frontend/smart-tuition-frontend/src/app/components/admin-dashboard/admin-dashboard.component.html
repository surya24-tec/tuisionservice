
<div class="dashboard-container">
  <h1>Admin Dashboard</h1>
  
  <div class="stats-grid">
    <mat-card class="stat-card">
      <mat-card-title>Total Students</mat-card-title>
      <mat-card-content>
        <h2>{{ dashboardData.totalStudents || 0 }}</h2>
      </mat-card-content>
    </mat-card>
    
    <mat-card class="stat-card">
      <mat-card-title>Total Teachers</mat-card-title>
      <mat-card-content>
        <h2>{{ dashboardData.totalTeachers || 0 }}</h2>
      </mat-card-content>
    </mat-card>
    
    <mat-card class="stat-card">
      <mat-card-title>Pending Fees</mat-card-title>
      <mat-card-content>
        <h2>{{ dashboardData.pendingFees || 0 }}</h2>
      </mat-card-content>
    </mat-card>
  </div>
</div>
