<div class="page-container">
  <div class="page-header">
    <div>
      <h1>Upload Marks</h1>
      <p>Review performance records and add new marks for student tests.</p>
    </div>
    <div class="actions">
      <button mat-stroked-button color="primary" (click)="exportCSV()">Export CSV</button>
      <button mat-flat-button color="primary" (click)="openForm()">Add Marks</button>
    </div>
  </div>

  <div class="filters">
    <input [(ngModel)]="searchQuery" (input)="applyFilter()" placeholder="Search student name" />
    <select [(ngModel)]="filterSubject" (change)="applyFilter()">
      <option value="">All Subjects</option>
      <option *ngFor="let subject of subjects" [value]="subject">{{ subject }}</option>
    </select>
    <select [(ngModel)]="filterClass" (change)="applyFilter()">
      <option value="">All Classes</option>
      <option *ngFor="let className of classes" [value]="className">{{ className }}</option>
    </select>
  </div>

  <div class="spinner-wrap" *ngIf="isLoading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <table mat-table [dataSource]="dataSource" matSort *ngIf="!isLoading">
    <ng-container matColumnDef="studentName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Student</th>
      <td mat-cell *matCellDef="let row">{{ row.studentName }}</td>
    </ng-container>

    <ng-container matColumnDef="testTitle">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Test</th>
      <td mat-cell *matCellDef="let row">{{ row.testTitle }}</td>
    </ng-container>

    <ng-container matColumnDef="subject">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Subject</th>
      <td mat-cell *matCellDef="let row">{{ row.subject }}</td>
    </ng-container>

    <ng-container matColumnDef="className">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Class</th>
      <td mat-cell *matCellDef="let row">{{ row.className }}</td>
    </ng-container>

    <ng-container matColumnDef="marksObtained">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Marks</th>
      <td mat-cell *matCellDef="let row">{{ row.marksObtained }}/{{ row.maxMarks }}</td>
    </ng-container>

    <ng-container matColumnDef="grade">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Grade</th>
      <td mat-cell *matCellDef="let row"><span [ngClass]="getGradeClass(row.grade)">{{ row.grade }}</span></td>
    </ng-container>

    <ng-container matColumnDef="examDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
      <td mat-cell *matCellDef="let row">{{ row.examDate }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]"></mat-paginator>

  <div class="form-card" *ngIf="showForm">
    <h2>Add Marks</h2>
    <div class="form-grid">
      <input [(ngModel)]="newMark.studentName" placeholder="Student Name" />
      <input [(ngModel)]="newMark.testTitle" placeholder="Test Title" />
      <select [(ngModel)]="newMark.subject">
        <option value="">Select Subject</option>
        <option *ngFor="let subject of subjects" [value]="subject">{{ subject }}</option>
      </select>
      <select [(ngModel)]="newMark.className">
        <option value="">Select Class</option>
        <option *ngFor="let className of classes" [value]="className">{{ className }}</option>
      </select>
      <input [(ngModel)]="newMark.marksObtained" type="number" placeholder="Marks Obtained" />
      <input [(ngModel)]="newMark.maxMarks" type="number" placeholder="Maximum Marks" />
      <input [(ngModel)]="newMark.examDate" type="date" />
    </div>
    <div class="actions">
      <button mat-button (click)="closeForm()">Cancel</button>
      <button mat-flat-button color="primary" (click)="saveMark()">Save</button>
    </div>
  </div>
</div>
